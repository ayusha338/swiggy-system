services:

  mysql:
    image: mysql:8.0
    container_name: swiggy-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpass123
      MYSQL_DATABASE: order_service_db
      MYSQL_USER: swiggy_user
      MYSQL_PASSWORD: swiggy_pass123
    ports:
      - "3307:3306"

  mongo:
    image: mongo:7.0
    container_name: swiggy-mongo
    ports:
      - "27017:27017"

  redis:
    image: redis:7.2
    container_name: swiggy-redis
    ports:
      - "6379:6379"

  kafka:
    image: apache/kafka:4.2.1
    container_name: swiggy-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,INTERNAL://:29092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qg
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  kafbat-ui:
    image: ghcr.io/kafbat/kafka-ui:latest
    container_name: swiggy-kafka-ui
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: swiggy-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    depends_on:
      - kafka