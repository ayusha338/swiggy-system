server:
  port: 8082
spring:
  application:
    name: catalog-service
  mongodb:
    uri: mongodb://localhost:27017/catalog_service_db
management:
  endpoint:
    health:
      probes:
        enabled: true
  health:
    livenessState:
      enabled: true
    readinessState:
      enabled: true
  endpoints:
    web:
      exposure:
        include: health,prometheus
otel:
  service:
    name: catalog-service   # different per service - catalog-service, assignment-service, tracking-service
  exporter:
    otlp:
      endpoint: http://jaeger:4318
  traces:
    exporter: otlp