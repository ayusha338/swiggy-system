apiVersion: apps/v1
kind: Deployment
metadata:
  name: swiggy-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: swiggy-redis
  template:
    metadata:
      labels:
        app: swiggy-redis
    spec:
      containers:
        - name: redis
          image: {{ .Values.redis.image }}
          ports:
            - containerPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: swiggy-redis
spec:
  selector:
    app: swiggy-redis
  ports:
    - port: 6379
      targetPort: 6379
