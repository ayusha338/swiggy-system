apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
    scrape_configs:
      - job_name: 'order-service'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['order-service:{{ .Values.orderService.port }}']
      - job_name: 'catalog-service'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['catalog-service:{{ .Values.catalogService.port }}']
      - job_name: 'assignment-service'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['assignment-service:{{ .Values.assignmentService.port }}']
      - job_name: 'tracking-service'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['tracking-service:{{ .Values.trackingService.port }}']
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: {{ .Values.prometheus.image }}
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: config-volume
              mountPath: /etc/prometheus/prometheus.yml
              subPath: prometheus.yml
      volumes:
        - name: config-volume
          configMap:
            name: prometheus-config
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
spec:
  selector:
    app: prometheus
  ports:
    - port: 9090
      targetPort: 9090
  type: NodePort
