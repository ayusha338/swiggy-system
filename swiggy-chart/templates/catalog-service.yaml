apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog-service
spec:
  replicas: {{ .Values.catalogService.replicas }}
  selector:
    matchLabels:
      app: catalog-service
  template:
    metadata:
      labels:
        app: catalog-service
    spec:
      containers:
        - name: catalog-service
          image: {{ .Values.catalogService.image }}
          imagePullPolicy: Never
          ports:
            - containerPort: {{ .Values.catalogService.port }}
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: {{ .Values.catalogService.port }}
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: {{ .Values.catalogService.port }}
            initialDelaySeconds: 20
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: catalog-service
spec:
  selector:
    app: catalog-service
  ports:
    - port: {{ .Values.catalogService.port }}
      targetPort: {{ .Values.catalogService.port }}
  type: NodePort
