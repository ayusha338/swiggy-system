apiVersion: apps/v1
kind: Deployment
metadata:
  name: assignment-service
spec:
  replicas: {{ .Values.assignmentService.replicas }}
  selector:
    matchLabels:
      app: assignment-service
  template:
    metadata:
      labels:
        app: assignment-service
    spec:
      containers:
        - name: assignment-service
          image: {{ .Values.assignmentService.image }}
          imagePullPolicy: Never
          ports:
            - containerPort: {{ .Values.assignmentService.port }}
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: {{ .Values.assignmentService.port }}
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: {{ .Values.assignmentService.port }}
            initialDelaySeconds: 20
            periodSeconds: 15
          volumeMounts:
            - name: logs
              mountPath: /app/logs
      volumes:
        - name: logs
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: assignment-service
spec:
  selector:
    app: assignment-service
  ports:
    - port: {{ .Values.assignmentService.port }}
      targetPort: {{ .Values.assignmentService.port }}
  type: NodePort