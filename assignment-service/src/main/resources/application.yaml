server:
  port: 8083
spring:
  application:
    name: assignment-service
  data:
    redis:
      host: localhost
      port: 6379
management:
  endpoint:
    health:
      probes:
        enabled: true
  health:
    livenessState:
      enabled: true
    readinessState:
      enabled: true
  endpoints:
    web:
      exposure:
        include: health,prometheus